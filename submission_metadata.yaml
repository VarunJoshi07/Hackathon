# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  The solution implements a deterministic two-stage candidate ranking pipeline designed to maximize ranking quality while satisfying the competition's CPU-only, offline, and reproducibility constraints. 
  The First Pass performs efficient semantic retrieval using embedding-based search to reduce the candidate pool from the full dataset to the top 1,000 candidates. 
  The Second Pass reranks these candidates using a Cross-Encoder for deeper semantic matching between the job description and candidate profiles, selecting the final top 100 candidates.
  Final scores are computed deterministically using a weighted combination of Cross-Encoder similarity, embedding similarity, career progression signals, and behavioral signals, with additional bonuses for relevant production experience and years of experience.
  Deterministic multi-level tie-breaking ensures reproducible rankings.
  A profile-aware reasoning module generates concise, evidence-based justifications using measurable candidate attributes and job-description alignment while avoiding hallucinations.
  On the evaluation machine, the complete pipeline processed 1,000 candidates in the First Pass, produced the final Top 100 after reranking, and generated the submission CSV in approximately 169.33 seconds, 
  remaining within the competition's CPU, memory, and runtime constraints.
